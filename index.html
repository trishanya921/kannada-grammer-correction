<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kannada Grammar Corrector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 ಕನ್ನಡ ವ್ಯಾಕರಣ ಸರಿಪಡಿಸುವವನು</h1>
            <h2>Kannada Grammar Corrector</h2>
            <p class="subtitle">Fix grammatical errors in Kannada sentences instantly</p>
        </header>

        <div class="main-content">
            <div class="input-section">
                <label for="inputText">
                    <span class="label-icon">📝</span>
                    Enter Kannada Sentence with Errors
                </label>
                <textarea 
                    id="inputText" 
                    placeholder="ಇಲ್ಲಿ ನಿಮ್ಮ ಕನ್ನಡ ವಾಕ್ಯವನ್ನು ಬರೆಯಿರಿ... (Enter your Kannada sentence here...)"
                    rows="6"
                ></textarea>
                <div class="char-count">
                    <span id="charCount">0</span> characters
                </div>
            </div>

            <div class="button-container">
                <button id="correctBtn" class="correct-btn">
                    <span class="btn-icon">✨</span>
                    Correct Grammar
                </button>
                <button id="clearBtn" class="clear-btn">
                    <span class="btn-icon">🗑️</span>
                    Clear
                </button>
            </div>

            <div id="loadingSpinner" class="loading-spinner" style="display: none;">
                <div class="spinner"></div>
                <p>Analyzing and correcting grammar...</p>
            </div>

            <div id="outputSection" class="output-section" style="display: none;">
                <label>
                    <span class="label-icon">✅</span>
                    Corrected Sentence
                </label>
                <div id="outputText" class="output-text"></div>
                
                <div id="changesSection" class="changes-section" style="display: none;">
                    <label>
                        <span class="label-icon">📋</span>
                        Changes Made
                    </label>
                    <div id="changesText" class="changes-text"></div>
                </div>

                <button id="copyBtn" class="copy-btn">
                    <span class="btn-icon">📋</span>
                    Copy Corrected Text
                </button>
            </div>

            <div id="errorMessage" class="error-message" style="display: none;"></div>
        </div>

        <footer>
            <p>Powered by Google Gemini AI | Made with ❤️ for Kannada Language</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
